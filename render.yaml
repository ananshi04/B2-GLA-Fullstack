databases:
  - name: b2-bharti-db
    databaseName: b2bharti
    user: b2bharti

services:
  - type: web
    name: b2-bharti-flask
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.app:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: b2-bharti-db
          property: connectionString
      - key: FLASK_ENV
        value: production
