<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Management System{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f13;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .container {
            background: #1a1a24;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #2a2a3a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            margin: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #fff; font-size: 28px; margin-bottom: 8px; }
        .header p { color: #888; font-size: 14px; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            font-size: 14px;
            background: #0f0f13;
            color: #e0e0e0;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #7c6af7;
            box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: #6a58e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,106,247,0.35);
        }

        .error { color: #ff6b6b; font-size: 12px; margin-top: 5px; display: block; }

        .message {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .message.error { background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.2); }
        .message.success { background: rgba(72,199,142,0.1); color: #48c78e; border: 1px solid rgba(72,199,142,0.2); }

        .link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a3a;
            color: #888;
            font-size: 14px;
        }

        .link a { color: #7c6af7; text-decoration: none; font-weight: 500; }
        .link a:hover { color: #a89af9; }

        .logout-btn {
            background: transparent;
            color: #aaa;
            padding: 8px 16px;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .logout-btn:hover { border-color: #7c6af7; color: #7c6af7; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
